# FAC Platform V5.1 - Deployment
# Frontend: Cloudflare Pages (https://www.hkfac.com)
# Backend API: Cloudflare Workers + D1

name: Deploy V5.1

on:
  push:
    branches: [ main, master ]

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # ============================================
  # Job 1: 构建前端
  # ============================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: rm -rf node_modules && npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: 'https://api-fac-platform.mark-377.workers.dev'
          TSC_COMPILE_ON_ERROR: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: './dist'

  # ============================================
  # Job 2: 部署前端到 Cloudflare Pages
  # ============================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: './dist'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fac-platform --branch=main

  # ============================================
  # Job 3: 部署 Cloudflare Workers API
  # ============================================
  deploy-workers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config worker/wrangler.toml
