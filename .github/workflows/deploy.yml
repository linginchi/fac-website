# FAC Platform V5.1 - Deployment
# Frontend: GitHub Pages (https://www.hkfac.com)
# Backend API: Cloudflare Workers + D1

name: Deploy V5.1

on:
  push:
    branches: [ main, master ]

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================
  # Job 1: 构建并部署前端到 GitHub Pages
  # ============================================
  deploy-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: 'https://api-fac-platform.mark-377.workers.dev'
          # 禁用 TypeScript 严格检查
          TSC_COMPILE_ON_ERROR: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # ============================================
  # Job 2: 部署 Cloudflare Workers API
  # ============================================
  deploy-workers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
