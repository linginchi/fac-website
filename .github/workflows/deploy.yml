# FAC Platform V5.1 - Deployment
# Frontend: GitHub Pages (https://www.hkfac.com)
# Backend API: Cloudflare Workers + D1

name: Deploy V5.1

on:
  push:
    branches: [ main, master ]

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================
  # Job 1: 构建前端
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # API 基础路径 - 指向 Cloudflare Workers
          # 创建 Workers 后，替换为实际的 Workers 域名
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'https://api-fac-platform.mark-377.workers.dev' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ============================================
  # Job 2: 部署前端到 GitHub Pages
  # ============================================
  deploy-frontend:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-frontend
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================
  # Job 3: 部署 Cloudflare Workers API
  # ============================================
  deploy-workers:
    runs-on: ubuntu-latest
    needs: build-frontend
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  # ============================================
  # Job 4: 数据库迁移
  # ============================================
  database-migrate:
    runs-on: ubuntu-latest
    needs: deploy-workers
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Apply D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 migrations apply fac-platform-db-prod
