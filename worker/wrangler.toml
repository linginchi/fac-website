# FAC Platform V5.1 - Cloudflare Workers Configuration
name = "api-fac-platform"
main = "src/index.ts"
compatibility_date = "2024-03-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "fac-platform-db"
database_id = "e36f6f71-afb7-42c1-814e-484e841ee6e8" # 需要在Cloudflare控制台创建后填入

# Environment Variables
[vars]
LINKEDIN_CLIENT_ID = "86rh0n847vlmx9"
LINKEDIN_REDIRECT_URI = "https://www.hkfac.com/auth/linkedin/callback"
FAC_TOKEN_ISSUER = "fac-platform"
FAC_TOKEN_AUDIENCE = "fac-api"

# KV Namespace for OTP codes and session data
[[kv_namespaces]]
binding = "KV"
id = "aad85b6180ee49cebff894c8acac2499"

# Secrets (使用 wrangler secret put 设置)
# LINKEDIN_CLIENT_SECRET
# JWT_SECRET_KEY
# ENCRYPTION_KEY
# QWEN_API_KEY
# DEEPSEEK_API_KEY
# DOUBAO_API_KEY
# DOUBAO_ENDPOINT_ID

[env.staging]
name = "fac-platform-api-staging"
[env.staging.vars]
LINKEDIN_REDIRECT_URI = "https://staging.hkfac.com/auth/linkedin/callback"

[env.production]
name = "api-fac-platform"
[env.production.vars]
LINKEDIN_REDIRECT_URI = "https://www.hkfac.com/auth/linkedin/callback"
